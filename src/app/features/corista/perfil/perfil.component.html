<div class="bg-slate-50 dark:bg-slate-950 min-h-screen pb-12 transition-colors duration-300">
    <!-- Header -->
    <header class="bg-primary dark:bg-slate-900 text-white rounded-b-3xl shadow-lg relative overflow-hidden">
        <div
            class="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
        </div>
        <div class="px-6 pt-12 pb-8 relative z-10 flex items-center gap-4">
            <button (click)="goBack()"
                class="w-10 h-10 rounded-xl bg-white/10 backdrop-blur-sm flex items-center justify-center border border-white/20 active:scale-95 transition-all hover:bg-white/20">
                <span class="material-symbols-outlined text-white text-[20px]">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold tracking-tight">Meu Perfil</h1>
        </div>
    </header>

    <main class="px-6 -mt-6 relative z-20 max-w-lg mx-auto">
        <!-- Profile Card -->
        <div
            class="bg-white dark:bg-slate-900 rounded-3xl p-8 shadow-xl border border-slate-100 dark:border-slate-800 space-y-8">

            <!-- Avatar Upload Section -->
            <div class="flex flex-col items-center gap-4">
                <div class="relative group">
                    <div
                        class="w-32 h-32 rounded-full border-4 border-slate-50 dark:border-slate-800 overflow-hidden shadow-inner bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
                        @if (previewUrl) {
                        <img [src]="previewUrl" class="w-full h-full object-cover" alt="Avatar">
                        } @else {
                        <span class="material-symbols-outlined text-5xl text-slate-300">person</span>
                        }
                    </div>
                    <label for="avatar-input"
                        class="absolute bottom-1 right-1 w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg cursor-pointer hover:scale-110 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-[20px]">photo_camera</span>
                        <input type="file" id="avatar-input" class="hidden" (change)="onFileSelected($event)"
                            accept="image/*">
                    </label>
                </div>
                <div class="text-center">
                    <p class="text-xs text-slate-500 dark:text-slate-400">Toque na câmera para alterar sua foto</p>
                </div>
            </div>

            <!-- Form -->
            <div class="space-y-6">
                <!-- Nome Completo -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Nome
                        Completo</label>
                    <div>
                        <input type="text" [(ngModel)]="fullName"
                               appUppercase
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="Seu nome completo">
                    </div>
                </div>

                <!-- Username -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Nome
                        de Usuário (Username)</label>
                    <div>
                        <input type="text" [(ngModel)]="username"
                               appUppercase
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="ex: joao_silva">
                    </div>
                </div>

                <!-- RG -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">RG</label>
                    <div>
                        <input type="text" [(ngModel)]="rg"
                               appUppercase
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="00.000.000-0">
                    </div>
                </div>

                <!-- Órgão Emissor -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Órgão Emissor</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">account_balance</span>
                        <input type="text" [(ngModel)]="orgao_emissor"
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                            placeholder="Órgão Emissor">
                    </div>
                </div>

                <!-- CPF -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">CPF</label>
                    <div>
                        <input type="text" [(ngModel)]="cpf"
                               mask="000.000.000-00"
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="000.000.000-00">
                    </div>
                </div>

                <!-- Data de Nascimento -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Data de Nascimento</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">calendar_today</span>
                        <input type="date" [(ngModel)]="data_nascimento"
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none">
                    </div>
                </div>

                <!-- Celular -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Celular</label>
                    <div>
                        <input type="text" [(ngModel)]="celular"
                               mask="(00) 00000-0000"
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="(11) 99999-9999">
                    </div>
                </div>

                <!-- Endereço -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Endereço</label>
                    <div>
                        <input type="text" [(ngModel)]="endereco"
                               appUppercase
                               class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-4 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                               placeholder="Rua Exemplo, 123, Bairro">
                    </div>
                </div>

                <!-- Naipe Selection -->
                <div class="space-y-2">
                    <label
                        class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Naipe
                        / Voz</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">music_note</span>
                        <select [(ngModel)]="voicePart"
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl py-3.5 pl-12 pr-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/50 transition-all outline-none appearance-none">
                            <option [ngValue]="null" disabled>Selecione seu naipe</option>
                            <option value="Soprano">Soprano</option>
                            <option value="Contralto">Contralto</option>
                            <option value="Tenor">Tenor</option>
                            <option value="Baixo">Baixo</option>
                            <option value="Regência">Regência</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                    </div>
                </div>
            </div>

            <!-- Error Message -->
            @if (uploadError()) {
            <div
                class="p-4 bg-rose-50 dark:bg-rose-900/20 border border-rose-100 dark:border-rose-800 rounded-2xl flex items-center gap-3 text-rose-600 dark:text-rose-400 animate-shake">
                <span class="material-symbols-outlined">error</span>
                <p class="text-xs font-medium">{{ uploadError() }}</p>
            </div>
            }

            <!-- Submit Button -->
            <button (click)="saveChanges()" [disabled]="isSaving()"
                class="w-full bg-primary hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-primary/30 active:scale-95 flex items-center justify-center gap-2 group">
                @if (isSaving()) {
                <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                Salvando...
                } @else {
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">save</span>
                Salvar Alterações
                }
            </button>

            <!-- Change Password Section -->
            <div class="border-t border-slate-100 dark:border-slate-800 pt-6 mt-6">
                <button (click)="toggleChangePassword()" 
                        class="w-full text-slate-600 dark:text-slate-400 font-bold py-2 mb-4 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-[20px]">{{ isChangingPassword() ? 'keyboard_arrow_up' : 'lock_reset' }}</span>
                    {{ isChangingPassword() ? 'Cancelar Troca de Senha' : 'Alterar Senha de Acesso' }}
                </button>

                @if(isChangingPassword()) {
                    <div class="space-y-4 animate-fade-in-down bg-slate-50 dark:bg-slate-800/20 p-5 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <!-- Nova Senha -->
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Nova Senha</label>
                            <input type="password" [(ngModel)]="newPassword"
                                   class="w-full bg-white dark:bg-slate-800 border-none rounded-xl py-3 px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                                   placeholder="Mínimo 6 caracteres">
                        </div>
                        
                        <!-- Confirmar Nova Senha -->
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Confirmar Nova Senha</label>
                            <input type="password" [(ngModel)]="confirmNewPassword"
                                   class="w-full bg-white dark:bg-slate-800 border-none rounded-xl py-3 px-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:ring-2 focus:ring-primary/50 transition-all outline-none"
                                   placeholder="Repita a nova senha">
                        </div>

                        <!-- Feedback Message -->
                        @if (passwordMessage()) {
                            <div class="p-3 text-sm font-medium rounded-xl mt-2 text-center"
                                 [ngClass]="passwordMessage().includes('sucesso') ? 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/20 dark:text-emerald-400' : 'bg-rose-50 text-rose-600 dark:bg-rose-900/20 dark:text-rose-400 animate-shake'">
                                {{ passwordMessage() }}
                            </div>
                        }

                        <button (click)="updatePassword()" [disabled]="isSaving()"
                                class="w-full bg-slate-800 dark:bg-slate-700 hover:bg-slate-900 dark:hover:bg-slate-600 text-white font-bold py-3 mt-2 rounded-xl transition-all shadow-md active:scale-95 flex items-center justify-center gap-2">
                            @if (isSaving()) {
                                <div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                Atualizando...
                            } @else {
                                Confirmar Nova Senha
                            }
                        </button>
                    </div>
                }
            </div>

            <button (click)="goBack()" [disabled]="isSaving()"
                class="w-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-bold py-4 rounded-2xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-all active:scale-95">
                Cancelar
            </button>

        </div>
    </main>
    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 pb-safe pt-2 px-6 z-50">
        <div class="flex justify-between items-center max-w-sm mx-auto h-16">
            <button (click)="goBack()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 w-16 transition-colors">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-medium">Início</span>
            </button>
            <button (click)="goToAgenda()" class="flex flex-col items-center gap-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 w-16 transition-colors">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
                <span class="text-[10px] font-medium">Agenda</span>
            </button>
            <button class="flex flex-col items-center gap-1 text-primary w-16">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
                <span class="text-[10px] font-medium">Perfil</span>
            </button>
            @if(isAdmin()) {
            <button (click)="goToAdmin()"
                class="flex flex-col items-center gap-1 text-violet-600 dark:text-violet-400 hover:text-violet-700 dark:hover:text-violet-300 w-16 transition-colors">
                <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
                <span class="text-[10px] font-medium">Admin</span>
            </button>
            }
        </div>
    </nav>
</div>

<style>
    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-4px);
        }

        75% {
            transform: translateX(4px);
        }
    }

    .animate-shake {
        animation: shake 0.2s ease-in-out 0s 2;
    }
    
    @keyframes fadeInDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .animate-fade-in-down {
        animation: fadeInDown 0.3s ease-out forwards;
    }
</style>
